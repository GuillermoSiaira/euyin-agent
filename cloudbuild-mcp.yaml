steps:
  # Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/abu-oracle/euyin-mcp', '.']

  # Push the container image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/abu-oracle/euyin-mcp']

  # Deploy container image to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'euyin-mcp'
      - '--image'
      - 'gcr.io/abu-oracle/euyin-mcp'
      - '--region'
      - 'us-central1'
      - '--allow-unauthenticated'
      - '--set-env-vars'
      - 'ABU_ENGINE_URL=https://abu-engine-503488473965.us-central1.run.app'

images:
  - 'gcr.io/abu-oracle/euyin-mcp'

options:
  logging: CLOUD_LOGGING_ONLY
